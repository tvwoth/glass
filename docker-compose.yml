services:
  app:
    build: .
    container_name: glass
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_PORT=${APP_PORT}
    volumes:
      - ./data/user_configs:/app/app/user_configs
    expose:
      - "${APP_PORT}"
    networks:
      - glass-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.getenv('APP_PORT', '5000'))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:stable-alpine
    container_name: glass-nginx
    restart: unless-stopped
    ports:
      - "${HOST_HTTP_PORT:-80}:80"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - glass-net

networks:
  glass-net:
    driver: bridge

